naftiko: 1.0.0-alpha2
info:
  label: Northflank API — Projects
  description: 'Northflank API — Projects. 2 operations. Lead operation: List projects. Self-contained Naftiko capability
    covering one Northflank business surface.'
  tags:
  - Northflank
  - Projects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NORTHFLANK_API_KEY: NORTHFLANK_API_KEY
capability:
  consumes:
  - type: http
    namespace: northflank-projects
    baseUri: https://api.northflank.com/v1
    description: Northflank API — Projects business capability. Self-contained, no shared references.
    resources:
    - name: team-projects
      path: /team/projects
      operations:
      - name: listprojects
        method: GET
        description: List projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createproject
        method: POST
        description: Create a project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.NORTHFLANK_API_KEY}}'
  exposes:
  - type: rest
    namespace: northflank-projects-rest
    port: 8080
    description: REST adapter for Northflank API — Projects. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/team/projects
      name: team-projects
      description: REST surface for team-projects.
      operations:
      - method: GET
        name: listprojects
        description: List projects
        call: northflank-projects.listprojects
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createproject
        description: Create a project
        call: northflank-projects.createproject
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: northflank-projects-mcp
    port: 9090
    transport: http
    description: MCP adapter for Northflank API — Projects. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-projects
      description: List projects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: northflank-projects.listprojects
      outputParameters:
      - type: object
        mapping: $.
    - name: create-project
      description: Create a project
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: northflank-projects.createproject
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
